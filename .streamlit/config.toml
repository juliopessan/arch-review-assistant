[theme]
# FCamara Brand Colors (fcamara-style-guide skill)
primaryColor             = "#F04E37"   # FCamara orange
backgroundColor          = "#FFFFFF"   # clean white canvas
secondaryBackgroundColor = "#FFF3F1"   # FCamara orange tint (sidebar, inputs)
textColor                = "#2E2E2E"   # FCamara dark grey

# Typography — closest system equivalent to Arial
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
